<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fy Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

/* camera */
#reader {
  width:100vw;
  height:100vh;
}

/* dark overlay */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

/* scan frame sahaja (no white box) */
.scan-box {
  position:absolute;
  width:70%;
  height:35%;
  top:32.5%;
  left:15%;

  border:2px solid rgba(255,255,255,0.3);
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
  overflow:hidden;
  background:transparent; /* penting */
}

/* red line */
.scan-line {
  position:absolute;
  width:100%;
  height:2px;
  background:red;
  animation:scan 2s linear infinite;
}

@keyframes scan {
  0% { top:0; }
  100% { top:100%; }
}

/* hide html5-qrcode UI */
#reader__dashboard,
#reader__status_span {
  display:none !important;
}
</style>
</head>

<body>

<div id="reader"></div>

<div class="overlay">
  <div class="scan-box">
    <div class="scan-line"></div>
  </div>
</div>

<script>

const html5QrCode = new Html5Qrcode("reader");
let scanned = false;

function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  if (navigator.vibrate) navigator.vibrate(100);

  try {
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
  } catch(e){}

  html5QrCode.stop();

  alert("Scanned: " + decodedText);
}

Html5Qrcode.getCameras().then(devices => {

  if (devices.length) {

    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 150 }
      },
      onScanSuccess
    );

  }

});

</script>

</body>
</html>
