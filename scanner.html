<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* camera fullscreen */
#reader {
  width: 100vw;
  height: 100vh;
}

/* scan box (yang kau tanda hijau) */
.scan-box {
  position: absolute;
  width: 70%;
  height: 35%;
  top: 32.5%;
  left: 15%;

  border: 2px solid rgba(255,255,255,0.4);
  background: transparent;
  overflow: hidden;
}

/* red scan line */
.scan-line {
  position: absolute;
  width: 100%;
  height: 2px;
  background: red;
  animation: scan 2s linear infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

/* hide html5-qrcode default UI */
#reader__dashboard,
#reader__status_span {
  display: none !important;
}
</style>
</head>

<body>

<div id="reader"></div>

<div class="scan-box">
  <div class="scan-line"></div>
</div>

<script>

const html5QrCode = new Html5Qrcode("reader");

let scanned = false;

function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  // vibration
  if (navigator.vibrate) navigator.vibrate(100);

  // beep
  try {
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
  } catch(e){}

  html5QrCode.stop();

  alert("Scanned: " + decodedText);
}

// start camera
Html5Qrcode.getCameras().then(devices => {

  if (devices.length) {

    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 150 }
      },
      onScanSuccess
    );

  } else {
    alert("No camera found");
  }

}).catch(err => {
  alert("Camera error: " + err);
});

</script>

</body>
</html>w
