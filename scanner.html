<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Align Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

/* camera */
#reader {
  width:100vw;
  height:100vh;
  position:relative;
}

/* hide UI */
#reader__dashboard,
#reader__status_span {
  display:none !important;
}

/* ✅ EXACT MATCH BOX */
.scan-box {
  position:absolute;
  width:60vmin;
  height:60vmin;

  top:50%;
  left:50%;
  transform:translate(-50%, -50%);

  border:2px solid rgba(255,255,255,0.6);
  box-sizing:border-box;
  pointer-events:none;
}

/* red line */
.scan-line {
  position:absolute;
  width:100%;
  height:2px;
  background:red;
  animation:scan 2s linear infinite;
}

@keyframes scan {
  0% { top:0; }
  100% { top:100%; }
}
</style>
</head>

<body>

<div id="reader"></div>

<div class="scan-box">
  <div class="scan-line"></div>
</div>

<script>

const html5QrCode = new Html5Qrcode("reader");
let scanned = false;

function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  if (navigator.vibrate) navigator.vibrate(100);

  html5QrCode.stop();

  alert(decodedText);
}

Html5Qrcode.getCameras().then(devices => {

  if (devices.length) {

    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,

        // 🔥 MATCH EXACT dengan CSS
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          let size = Math.min(viewfinderWidth, viewfinderHeight) * 0.6;
          return { width: size, height: size };
        }

      },
      onScanSuccess
    );

  }

});
</script>

</body>
</html>
