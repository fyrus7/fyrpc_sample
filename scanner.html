<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Square Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

/* camera */
#reader {
  width:100vw;
  height:100vh;
  position:relative;
}

/* hide default UI text */
#reader__dashboard,
#reader__status_span {
  display:none !important;
}

/* ✅ SINGLE SQUARE BOX */
.scan-box {
  position:absolute;
  width:260px;
  height:260px;

  top:50%;
  left:50%;
  transform:translate(-50%, -50%);

  border:2px solid rgba(255,255,255,0.5);
  box-sizing:border-box;
  pointer-events:none;
}

/* red scan line */
.scan-line {
  position:absolute;
  width:100%;
  height:2px;
  background:red;
  animation:scan 2s linear infinite;
}

@keyframes scan {
  0% { top:0; }
  100% { top:100%; }
}
</style>
</head>

<body>

<div id="reader"></div>

<div class="scan-box">
  <div class="scan-line"></div>
</div>

<script>

const html5QrCode = new Html5Qrcode("reader");
let scanned = false;

function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  if (navigator.vibrate) navigator.vibrate(100);

  try {
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
  } catch(e){}

  html5QrCode.stop();

  alert("Scanned: " + decodedText);
}

Html5Qrcode.getCameras().then(devices => {

  if (devices.length) {

    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,

        // 🔥 KUNCI: square region
        qrbox: { width: 260, height: 260 }

      },
      onScanSuccess
    );

  }

});

</script>

</body>
</html>
