<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

/* camera full screen */
#reader {
  width:100vw;
  height:100vh;
}

/* buang semua UI html5-qrcode */
#reader__dashboard,
#reader__status_span {
  display:none !important;
}
</style>
</head>

<body>

<div id="reader"></div>

<script>

const html5QrCode = new Html5Qrcode("reader");

let scanned = false;

function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  // vibrate
  if (navigator.vibrate) navigator.vibrate(100);

  // bunyi
  try {
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
  } catch(e){}

  html5QrCode.stop();

  // test output
  alert("Scanned: " + decodedText);

}

Html5Qrcode.getCameras().then(devices => {

  if (devices.length) {

    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: 250 // still helps detection walaupun tak nampak
      },
      onScanSuccess
    );

  }

});

</script>

</body>
</html>
